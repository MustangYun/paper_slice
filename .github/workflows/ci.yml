name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: lint+type+test (py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (type check)
        # v9 튜닝 시점엔 MinerU/PaddleOCR 타입 스텁 부재로 incremental.
        # strict 전환은 TODOS.md 참고.
        run: mypy src/paperslice || true

      - name: Pytest
        run: pytest -v

  docker-build:
    name: docker build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CPU image (syntax + deps only, no prebake)
        # BUILD_OFFLINE_TOLERANT=1 로 프리베이크 단계를 soft-fail 시킨다.
        # 이유: 프리베이크는 modelscope 에서 수 GB 모델을 당기므로 30~45분 걸려
        # PR CI 에 적합하지 않다. CI 의 역할은 Dockerfile syntax 와 pip 의존성
        # 설치가 깨지지 않았는지 확인 (~3분). 프리베이크 검증은 릴리즈 빌드나
        # 사용자 로컬 빌드 (BUILD_OFFLINE_TOLERANT=0, 기본값) 에서.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_OFFLINE_TOLERANT=1
          tags: paperslice:ci
